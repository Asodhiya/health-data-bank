services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healthdatabank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hdb-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - hdb-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/backend
    command: bash -c "./start.sh --reload"
    environment:
      - user=postgres
      - password=postgres
      - host=postgres
      - port=5432
      - dbname=healthdatabank
      - DB_SSLMODE=disable
      - WATCHFILES_FORCE_POLLING=true
      - RATE_LIMIT_BACKEND=redis
      - REDIS_URL=redis://redis:6379/0
      - DB_POOL_SIZE=5
      - DB_MAX_OVERFLOW=0
      - DB_POOL_TIMEOUT=30
      - DB_POOL_RECYCLE=1800
      - SESSION_IDLE_TIMEOUT_MINUTES=30
      - SESSION_TOKEN_EXPIRE_MINUTES=10080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hdb-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    networks:
      - hdb-network

volumes:
  pgdata:

networks:
  hdb-network:
