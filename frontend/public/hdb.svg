<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect x="4" y="4" width="56" height="56" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner top highlight -->
  <rect x="4" y="4" width="56" height="28" rx="14" fill="white" fill-opacity="0.08"/>

  <!-- ECG line in upper half -->
  <g clip-path="url(#rounded)">
    <polyline
      points="4,30 14,30 18,18 23,40 27,24 31,33 34,28 38,28 42,30 60,30"
      stroke="white"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.95"
    />
  </g>

  <!-- Thin divider -->
  <line x1="12" y1="40" x2="52" y2="40" stroke="white" stroke-width="0.75" stroke-opacity="0.3"/>

  <!-- HDB text in lower half -->
  <text
    x="32"
    y="54"
    text-anchor="middle"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="13"
    letter-spacing="1.5"
    fill="white"
    fill-opacity="0.97"
  >HDB</text>
</svg>
