services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules # This protects the container's modules from being overwritten by your local ones
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with hot-reload on some Windows/WSL setups
      - VITE_API_PROXY_TARGET=http://host.docker.internal:8000
